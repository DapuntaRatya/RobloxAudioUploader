services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rau_nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  web:
    build: .
    container_name: rau_web
    command: gunicorn app.main:app -k uvicorn_worker.UvicornWorker -w 2 -b 0.0.0.0:8000
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - rau_temp:/app/app/temp
    restart: unless-stopped

  worker:
    build: .
    container_name: rau_worker
    command: python -m app.workers.worker_app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - rau_temp:/app/app/temp
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rau_redis
    command: redis-server --appendonly yes
    volumes:
      - rau_redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: rau_postgres
    environment:
      POSTGRES_DB: rau
      POSTGRES_USER: rau
      POSTGRES_PASSWORD: rau_password
    volumes:
      - rau_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  rau_temp:
  rau_pgdata:
  rau_redis_data:
